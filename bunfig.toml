[install]
# 24h supply-chain guard: skip package versions published less than a day ago.
minimumReleaseAge = 86400
# Each entry bypasses the 24h guard for one package — confirm with the user
# before adding any. @vibelyai/vite-tanstack-config is the first-party Vibely
# build-config package; it must install regardless of release age.
minimumReleaseAgeExcludes = ["@vibelyai/vite-tanstack-config"]
